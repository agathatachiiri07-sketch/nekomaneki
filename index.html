<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nekomaneki</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: radial-gradient(circle at top, #f9d3d3, #ffffff 45%);
      }

      main {
        text-align: center;
        padding: 2rem;
        border-radius: 1rem;
        background: rgba(255, 255, 255, 0.75);
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
      }

      h1 {
        margin: 0 0 0.5rem;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Nekomaneki</h1>
      <p>Your Vercel deployment is working.</p>
    </main>
  </body>
</html>
